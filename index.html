<html>
    <head>
        <link rel="preload" href="/assets/CursedTimer.ttf" as="cursed-timer" type="font/ttf" crossorigin>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <div class="container">
            
            <div class='score-board'>
                <div class='home-team'>
                    <h3>HOME</h3>
                    <div class='display'><p class='score' id='home-score'>0</p></div>
                    <div class='score-btns'>
                        <button class='pts-btn' id='home-pts-1' onclick='addOne(this)'>+1</button>
                        <button class='pts-btn' id='home-pts-2' onclick='addTwo(this)'>+2</button>
                        <button class='pts-btn' id='home-pts-3' onclick='addThree(this)'>+3</button>
                    </div>
                    <button class='foul-pts' id='home-fouls-btn' onclick='teamFouls(this)'>Team Fouls +1</button>
                </div>
                
                <div class='mid-section'>
                    <div class='timer-display'>
                        <p id='timer'>00:00</p>  
                    </div>
                    <div class='counters'>
                        <div class='fouls-display' id='home-fouls-display'>
                            <p class='fouls-num' id='home-fouls'>0</p>  
                        </div>
                        <div class='period-display'>
                            <p id='period'>0</p>  
                        </div>
                        <div class='fouls-display' id='guest-fouls-display'>
                            <p class='fouls-num' id='guest-fouls'>0</p>  
                        </div>
                    </div>
                    <div class="display-labels">
                        <p class="label">Home Fouls</p>
                        <p class="label">Period</p>
                        <p class="label">Guest Fouls</p>
                    </div>
                    <div class='game-menu'>
                        <button class='game-btn' onclick='startGame()'>Start game</button>
                        <button class='game-btn' onclick='gameReset()'>Reset Game</button>
                        <button class='game-btn' id='pauseResume' onclick='pauseUnpauseGame()'>
                            Pause Game</button>
                    </div>
                </div>
                
                <div class='guest-team'>
                        <h3>GUEST</h3>
                        <div class='display'><p class='score' id='guest-score'>0</p></div>
                        <div class='score-btns'>
                            <button class='pts-btn' id='guest-pts-1' onclick='addOne(this)'>+1</button>
                            <button class='pts-btn' id='guest-pts-2' onclick='addTwo(this)'>+2</button>
                            <button class='pts-btn' id='guest-pts-3' onclick='addThree(this)'>+3</button>
                        </div>
                        <button class='foul-pts' id='guest-fouls-btn' onclick='teamFouls(this)'>Team Fouls +1</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
